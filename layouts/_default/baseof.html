<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .Title }}{{ .Title }} - {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117; color: #c9d1d9; line-height: 1.7;
      max-width: 800px; margin: 0 auto; padding: 20px;
    }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    header { border-bottom: 1px solid #21262d; padding: 30px 0; margin-bottom: 30px; }
    header h1 { font-size: 1.8em; color: #f0f6fc; }
    header p { color: #8b949e; margin-top: 5px; }
    nav { margin-top: 15px; }
    nav a { margin-right: 18px; color: #8b949e; font-size: 0.95em; }
    nav a:hover { color: #58a6ff; }
    .post-list { list-style: none; }
    .post-item { padding: 20px 0; border-bottom: 1px solid #21262d; }
    .post-item h2 { font-size: 1.3em; margin-bottom: 5px; }
    .post-meta { color: #8b949e; font-size: 0.85em; }
    .post-summary { color: #8b949e; margin-top: 8px; }
    article { padding: 20px 0; }
    article h1 { color: #f0f6fc; font-size: 2em; margin-bottom: 10px; }
    article h2 { color: #f0f6fc; margin: 25px 0 10px; }
    article h3 { color: #f0f6fc; margin: 20px 0 8px; }
    article p { margin: 12px 0; }
    article blockquote {
      border-left: 3px solid #58a6ff; padding: 10px 15px;
      margin: 15px 0; background: #161b22; border-radius: 4px;
      color: #8b949e;
    }
    article ul, article ol { padding-left: 25px; margin: 10px 0; }
    article li { margin: 5px 0; }
    article code { background: #161b22; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
    article pre { background: #161b22; padding: 15px; border-radius: 6px; overflow-x: auto; margin: 15px 0; }
    article pre code { background: none; padding: 0; }
    .tags { margin-top: 15px; }
    .tag {
      display: inline-block; background: #1f6feb22; color: #58a6ff;
      padding: 2px 10px; border-radius: 15px; font-size: 0.8em; margin: 3px;
    }
    footer { border-top: 1px solid #21262d; padding: 20px 0; margin-top: 40px; color: #8b949e; font-size: 0.85em; text-align: center; }
    .search-box { width: 100%; padding: 10px 15px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 1em; margin: 15px 0; }
    .search-box:focus { border-color: #58a6ff; outline: none; }
    hr { border: none; border-top: 1px solid #21262d; margin: 20px 0; }
  </style>
</head>
<body>
  <header>
    <h1><a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a></h1>
    <p>{{ .Site.Params.description }}</p>
    <nav>
      <a href="{{ .Site.BaseURL }}">🏠 首页</a>
      <a href="{{ .Site.BaseURL }}posts/">📝 文章</a>
      <a href="{{ .Site.BaseURL }}tags/">🏷️ 标签</a>
      <a href="{{ .Site.BaseURL }}categories/">📂 分类</a>
    </nav>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    <p>© {{ now.Year }} {{ .Site.Title }} · 由 Hugo 驱动 · AI自动生成</p>
  </footer>
</body>
</html>
